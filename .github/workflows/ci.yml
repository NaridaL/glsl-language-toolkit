name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build --workspace=packages/prettier-plugin-glsl

      - name: Lint
        run: npm run lint --workspace=packages/prettier-plugin-glsl

      - name: Test
        run: npm run test --workspace=packages/prettier-plugin-glsl
